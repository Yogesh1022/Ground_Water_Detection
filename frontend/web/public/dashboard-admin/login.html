<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AquaVidarbha - Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./login.css" />
</head>
<body>
  <canvas id="particles"></canvas>
  <div id="cursorGlow"></div>

  <main class="login-shell">
    <a href="../legacy/v2/index.html" class="back-link">Back to Home</a>

    <section class="login-card">
      <div class="brand-wrap">
        <div class="brand-logo">AV</div>
        <div>
          <h1>AquaVidarbha Admin</h1>
          <p>Authorized administrator access</p>
        </div>
      </div>

      <div class="msg" id="msgBox"></div>

      <form id="loginForm">
        <label class="label">Email</label>
        <input id="email" class="input" type="email" required placeholder="admin@aquavidarbha.in" />

        <label class="label">Password</label>
        <input id="password" class="input" type="password" minlength="8" required placeholder="Enter password" />

        <button id="loginBtn" class="btn" type="submit">Sign In</button>
      </form>

      <div class="note mono">Auth base: <span id="authBase"></span></div>
      <div class="note mono">Admin base: <span id="adminBase"></span></div>
    </section>
  </main>

  <script type="module" src="./login.js"></script>
</body>
</html>
