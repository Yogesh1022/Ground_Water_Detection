$kind: http-request
method: GET
url: '{{baseUrl}}/api/v1/admin/me'
order: 3200
headers:
  - key: Authorization
    value: Bearer {{citizenToken}}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Admin me with citizen token is 403', function () {
        pm.response.to.have.status(403);
      });
