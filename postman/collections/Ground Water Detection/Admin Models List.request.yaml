$kind: http-request
method: GET
url: '{{baseUrl}}/api/v1/admin/models'
order: 5200
headers:
  - key: Authorization
    value: Bearer {{adminToken}}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Admin models list is 200', function () {
        pm.response.to.have.status(200);
      });
