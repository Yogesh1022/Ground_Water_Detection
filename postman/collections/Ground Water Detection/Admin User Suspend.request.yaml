$kind: http-request
method: PUT
url: '{{baseUrl}}/api/v1/admin/users/{{testUserId}}/suspend'
order: 4500
headers:
  - key: Authorization
    value: Bearer {{adminToken}}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Admin user suspend is 200', function () {
        pm.response.to.have.status(200);
      });
