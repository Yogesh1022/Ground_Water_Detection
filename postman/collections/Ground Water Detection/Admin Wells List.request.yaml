$kind: http-request
method: GET
url: '{{baseUrl}}/api/v1/admin/wells?page=1&limit=10'
order: 4800
headers:
  - key: Authorization
    value: Bearer {{adminToken}}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Admin wells list is 200', function () {
        pm.response.to.have.status(200);
      });
