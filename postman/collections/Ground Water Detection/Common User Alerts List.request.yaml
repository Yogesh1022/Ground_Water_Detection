$kind: http-request
method: GET
url: '{{baseUrl}}/api/v1/common-user/alerts?district=Nagpur&type=warning'
order: 6500
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Common user alerts list is 200', function () {
        pm.response.to.have.status(200);
      });

      const json = pm.response.json();
      pm.test('Alerts list has data array', function () {
        pm.expect(json).to.have.property('data');
      });
