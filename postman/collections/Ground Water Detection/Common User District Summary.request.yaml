$kind: http-request
method: GET
url: '{{baseUrl}}/api/v1/common-user/districts/summary'
order: 6400
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Common user district summary is 200', function () {
        pm.response.to.have.status(200);
      });

      const json = pm.response.json();
      pm.test('District summary has data array', function () {
        pm.expect(json).to.have.property('data');
      });
