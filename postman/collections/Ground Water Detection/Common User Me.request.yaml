$kind: http-request
method: GET
url: '{{baseUrl}}/api/v1/common-user/me'
order: 6100
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Common user me is 200', function () {
        pm.response.to.have.status(200);
      });

      const json = pm.response.json();
      pm.test('Common user me payload has role', function () {
        pm.expect(json).to.have.property('role');
      });
