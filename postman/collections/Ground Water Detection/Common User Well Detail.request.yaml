$kind: http-request
method: GET
url: '{{baseUrl}}/api/v1/common-user/wells/{{commonWellId}}'
order: 6300
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Common user well detail is 200', function () {
        pm.response.to.have.status(200);
      });

      const json = pm.response.json();
      pm.test('Well detail has risk_level', function () {
        pm.expect(json).to.have.property('risk_level');
      });
