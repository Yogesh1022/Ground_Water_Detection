$kind: http-request
method: POST
url: '{{baseUrl}}/api/v1/auth/login'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "{{govEmail}}",
      "password": "{{govPassword}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Gov login is 200', function () {
        pm.response.to.have.status(200);
      });

      const json = pm.response.json();
      pm.environment.set('token', json.token);
      pm.environment.set('govToken', json.token);

      pm.test("User role is 'gov'", function () {
        pm.expect(json).to.have.nested.property('user.role', 'gov');
      });
