$kind: http-request
method: GET
url: '{{baseUrl}}/health'
order: 100
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Health is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Health status is ok', function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('status', 'ok');
      });
